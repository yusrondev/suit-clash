                } else {
                    startBtn.style.display = 'none';
                    waitingText.textContent = `Menunggu pemain lain... (${s.totalPlayers}/2)`;
                    waitingText.style.color = 'var(--cream)';
                }

                document.getElementById('round-badge').style.display = 'none';
                return;
            }

            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game').style.display = 'flex';
            document.getElementById('hud-top').style.display = 'flex'; // Show HUD in game
            document.getElementById('round-badge').style.display = 'flex';
            document.getElementById('round-badge').textContent = (s.roundCount || 1) + '/7';

            myIndex = s.yourIndex;
            currentSuit = s.currentSuit;
            isMyTurn = (s.currentPlayer === myIndex) && !amIOut;
            playerNames = s.playerNames || [];

            // HUD — hide deck visual when empty
            document.getElementById('deck-count').textContent = s.deckCount;
            document.getElementById('suit-label').textContent = 'Suit: ' + suitName(s.currentSuit);
            const deckRow = document.querySelector('.table-info-row.right');
            deckRow.classList.toggle('deck-hidden', s.deckCount === 0);

            // Status bar
            const sb = document.getElementById('status-bar');
            if (amIOut) {
                // sb.style.opacity = "0.6";
                sb.textContent = '👻 Kamu sudah selesai — Menonton permainan';
                sb.classList.remove('your-turn');
            } else if (isMyTurn) {

                const myCardCount = s.yourCards.length;

                if (!wasDraw) {

                    // 🔥 hampir menang (punya 1 kartu)
                    const myCardCount = s.yourCards.length;

                    // 🔥 hanya trigger kalau 1 kartu DAN bisa dimainkan
                    if (myCardCount === 1 && !amIOut) {
                        const lastCard = s.yourCards[0];

                        const isPlayable =
                            s.controller === myIndex || // bebas buang apa aja
                            lastCard.suit === s.currentSuit; // sesuai suit meja

                        if (isPlayable) {
                            triggerClutch("win");
                        }
                    }

                    // 🔥 lawan hampir menang
                    const dangerPlayers = s.playersCardCount
                        .map((cnt, i) => ({ cnt, i }))
                        .filter(p => p.i !== myIndex && p.cnt === 1);

                    if (dangerPlayers.length > 0) {
                        const now = Date.now();

                        // ambil set index sekarang
                        const currentSet = new Set(dangerPlayers.map(p => p.i));

                        const isSameAsBefore =
                            currentSet.size === lastDangerPlayers.size &&
                            [...currentSet].every(i => lastDangerPlayers.has(i));

                        const isCooldownActive = (now - lastDangerTime < DANGER_COOLDOWN);

                        // 🔥 hanya trigger kalau:
                        // - beda orang dari sebelumnya ATAU
                        // - cooldown sudah lewat
                        if (!isSameAsBefore || !isCooldownActive) {
                            const names = dangerPlayers
                                .map(p => playerNames[p.i] || `P${p.i + 1}`)
                                .join(', ');

                            triggerClutch("danger", names);

                            lastDangerPlayers = currentSet;
                            lastDangerTime = now;
                        }
                    } else {
                        // reset kalau tidak ada yang hampir menang
                        lastDangerPlayers.clear();
                    }
                }

                const isCtrl = (s.controller === myIndex);
                const deckEmpty = s.deckCount === 0;
                const hasSuit = s.yourCards.some(c => c.suit === s.currentSuit);
                if (isCtrl) {
                    sb.textContent = '👑 Giliranmu — Seret kartu apa saja ke meja!';
                } else if (!hasSuit && deckEmpty) {
                    sb.textContent = '🃏 Deck habis — Ambil kartu dari meja!';
                } else {
                    sb.textContent = '🃏 Giliranmu — Seret ' + suitName(s.currentSuit) + ' ke meja!';
                }
                sb.classList.add('your-turn');
                document.getElementById('your-id-tag').classList.add('active');
            } else {
                const name = playerNames[s.currentPlayer] || ('P' + (s.currentPlayer + 1));
                sb.textContent = 'Menunggu ' + name + '...';
                sb.classList.remove('your-turn');
                sb.classList.add('waiting');
                document.getElementById('your-id-tag').classList.remove('active');
                document.getElementById('your-id-tag').textContent = myName;
            }

            // Table cards spread
            renderTableSpread(s.tableCard, s.tableHistory || [], s.totalPlayers);

            // Opponents
            renderOpponents(s);

            // Hand
            renderHand(s.yourCards, s.currentSuit, isMyTurn && !amIOut, s.controller === myIndex);

            // Draw button
            const hasSuit = s.yourCards.some(c => c.suit === s.currentSuit);
            const isCtrl  = s.controller === myIndex;
            const drawBtn = document.getElementById('draw-btn');
            const deckEmpty = s.deckCount === 0;
            const canDrawFromDeck  = isMyTurn && s.deckCount > 0 && !hasSuit && !isCtrl;
            const canTakeFromTable = isMyTurn && deckEmpty && !hasSuit && !isCtrl && (s.tableHistory || []).length > 1;
            drawBtn.disabled = amIOut || !(canDrawFromDeck || canTakeFromTable);
            if (canTakeFromTable) {
                drawBtn.textContent = '🂠 Ambil dari Meja';
                drawBtn.style.borderColor = 'rgba(201,100,100,0.7)';
                drawBtn.style.color = '#e8a0a0';
            } else {
                drawBtn.textContent = 'Ambil Kartu';
                drawBtn.style.borderColor = '';
                drawBtn.style.color = '';
            }

            isMovePending = false;
        });

        /* ── RENDER TABLE SPREAD (tumpukan, elemen TIDAK pernah dihapus/dibuat ulang) ── */
        // Pool elemen kartu — dibuat sekali, dipakai terus
        const tableCardPool = [];

        function triggerClutch(type, name = "") {
            if (lastClutch === type) return;

            // 🔥 HAPUS YANG LAMA JIKA ADA (Mencegah menumpuk/tidak hilang)
            const existing = document.querySelector('.clutch-overlay');
            if (existing) existing.remove();
            clearTimeout(clutchTimeout);

            lastClutch = type;

            const el = document.createElement('div');
            el.className = 'clutch-overlay ' + type;

            if (type === "win") {
                el.textContent = "🔥 Satu kartu lagi!";
                playClutchSound('win');
            } else {
                el.textContent = `⚠️ ${name} hampir menang!`;
                playClutchSound('danger');
            }

            document.body.appendChild(el);

            clutchTimeout = setTimeout(() => {
                el.remove();
                lastClutch = "";
            }, 2000);
        }

        function closeLeaderboard() {
            document.getElementById('leaderboard-panel').classList.remove('show');
        }

        function getOrCreateTableSlot(idx) {
            if (tableCardPool[idx]) return tableCardPool[idx];
            const el = document.createElement('div');
            el.className = 'table-card';
            el.style.opacity = '0';
            el.style.transition = 'opacity 0.25s ease';
            document.getElementById('table-spread-area').appendChild(el);
            tableCardPool[idx] = el;
            return el;
        }

        function renderTableSpread(tableCard, tableHistory, totalPlayers) {
            const area = document.getElementById('table-spread-area');
            const cards = tableHistory.slice(-4);
            const total = cards.length;

            const stateHash = cards.map(c => c.value + c.suit).join('|');
            if (area.dataset.stateHash === stateHash) return;
            area.dataset.stateHash = stateHash;

            // Hitung lebar total spread — kartu pertama di kiri, terakhir di kanan
            const isMobileSpread = window.innerWidth < 600;
            const cardW = isMobileSpread ? 60 : 72;
            const peekW = isMobileSpread ? 20 : 26;
            const totalSpreadW = peekW * (total - 1) + cardW;
            const startX = -totalSpreadW / 2;

            // Sembunyikan slot yang tidak terpakai (misal awal game < 4 kartu)
            tableCardPool.forEach((el, i) => {
                if (i >= total) el.style.opacity = '0';
            });

            cards.forEach((card, idx) => {
                const isTop = (idx === total - 1);
                const el = getOrCreateTableSlot(idx);

                // Update konten hanya jika kartu berubah
                const newCardId = card.value + '-' + card.suit;
                if (el.dataset.cardId !== newCardId) {
                    el.dataset.cardId = newCardId;
                    const red = isRed(card.suit);
                    el.className = 'table-card' + (red ? ' red-card' : ' black-card');
                    el.innerHTML = `
                        <div class="tc-corner tl">${escHtml(card.value)}<br>${card.suit}</div>
                        <div class="tc-val">${card.suit}</div>
                        <div class="tc-corner br">${escHtml(card.value)}<br>${card.suit}</div>
                    `;
                    // Fade in kartu baru
                    el.style.transition = 'none';
                    el.style.opacity = '0';

                    // 🔥 EFEK BAKAR (ACE) - Hanya untuk kartu paling atas (yang baru turun)
                    if (card.value === 'A' && isTop) {
                        el.classList.add('card-ace-fire');
                        setTimeout(() => el.classList.remove('card-ace-fire'), 3000);
                    }

                    requestAnimationFrame(() => {
                        el.style.transition = 'left 0.3s ease, opacity 0.25s ease';
                        el.style.opacity = isTop ? '1' : '1';
                    });
                } else {
                    el.style.transition = 'left 0.3s ease, opacity 0.25s ease';
                    el.style.opacity = isTop ? '1' : '1';
                }

                el.classList.toggle('champion', isTop);
                el.classList.toggle('history', !isTop);
                el.style.zIndex = idx + 10;

                // Posisi X menyamping: setiap kartu geser peekW ke kanan
                const tx = startX + idx * peekW;

                // Rotasi kecil deterministik
                const id = card.value + card.suit;
                let sum = 0; for (let i = 0; i < id.length; i++) sum += id.charCodeAt(i);
                const rng = (off) => { const s = Math.sin(sum + off) * 10000; return s - Math.floor(s); };
                const rot = isTop ? (rng(1) * 4) - 2 : (rng(2) * 6) - 3;
                const ty = isTop ? 0 : (rng(3) * 6) - 3;

                const t = `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) rotate(${rot}deg)`;
                el.style.transform = t;
                el.style.setProperty('--base-transform', t);

                el.classList.add('card-hit');
                setTimeout(() => el.classList.remove('card-hit'), 120);
            });
        }

        /* ── ROUND RESOLVED — hanya tampilkan label pemenang, jangan hapus elemen ── */
        socket.on('roundResolved', (data) => {
            const label = document.getElementById('round-winner-label');
            const isMe = data.winner === myIndex;
            label.textContent = '🏅 ' + escHtml(data.winnerName) + (isMe ? ' (Kamu)' : '') + ' menang putaran!';
            label.classList.add('visible');
            setTimeout(() => label.classList.remove('visible'), 1200);
            // Elemen kartu TIDAK dihapus — renderTableSpread akan update sendiri saat state berikutnya datang
        });

        socket.on("emoji", (data) => {
            showEmoji(data.name, data);
        });

        function showEmoji(name, data) {
            const allPlayers = document.querySelectorAll('.opponent-name');

            allPlayers.forEach(nameEl => {
                const baseName = nameEl.childNodes[0]?.nodeValue?.trim();

                if (baseName === name) {
                    const container = nameEl.parentElement;

                    const emojiEl = document.createElement('div');
                    emojiEl.className = 'emoji-pop';

                    emojiEl.innerHTML = `
                        <div>${data.emoji}</div>
                        ${data.text ? `<div class="taunt-text">${data.text}</div>` : ''}
                    `;

                    container.appendChild(emojiEl);

                    // 🔊 FIX SOUND OVERLAP
                    tauntSound.pause();
                    tauntSound.currentTime = 0;
                    tauntSound.play().catch(()=>{});

                    setTimeout(() => emojiEl.remove(), 3000);
                }
            });
        }

        /* ── OPPONENTS ── */
        // Position order for opponents relative to player's index
        // With 1 opponent: top; 2: top-left & top-right; 3: top, left, right
        const OPPONENT_POSITIONS = {
            1: ['top'],
            2: ['left', 'right'],
            3: ['top', 'left', 'right'],
        };

        function renderOpponents(s) {
            const row = document.getElementById('opponents-row');
            row.innerHTML = '';

            // Collect opponent indices (everyone except me)
            const opponents = [];
            s.playersCardCount.forEach((cnt, i) => {
                if (i === myIndex) return;
                opponents.push({ i, cnt });
            });

            const n = opponents.length;
            if (n === 0) return;

            const positions = OPPONENT_POSITIONS[Math.min(n, 3)] || ['top'];

            opponents.forEach(({ i, cnt }, oppIdx) => {
                const pos = positions[oppIdx] || 'top';
                const isActive = (s.currentPlayer === i);
                const isCtrl = (s.controller === i);
                const isOut = s.playersIsOut && s.playersIsOut[i];
                const name = playerNames[i] || ('P' + (i + 1));

                const div = document.createElement('div');
                div.className = 'opponent-seat' + (isActive ? ' active-turn' : '');
                div.setAttribute('data-pos', pos);

                // Fan of card backs
                let cardsHtml = '';
                const maxDisplay = Math.min(cnt, 8);
                for (let j = 0; j < maxDisplay; j++) {
                    const angle = (j - (maxDisplay - 1) / 2) * 7;
                    const shift = (j - (maxDisplay - 1) / 2) * 10;
                    cardsHtml += `<div class="opp-card-back" style="transform: rotate(${angle}deg) translateX(${shift}px); z-index:${j}"></div>`;
                }

                div.innerHTML = `
                    <div class="opp-avatar${isOut ? '" style="opacity:0.4' : ''}">${getInitials(name)}</div>
                    <div class="opponent-name">${escHtml(name)}</div>
                    <div class="opp-cards">${cardsHtml}</div>
                    <div class="opp-card-count">${cnt} kartu${isOut ? ' 👻' : ''}</div>
                `;
                row.appendChild(div);
            });
        }

        /* ── HAND ── */
        // Touch drag state
        let touchDragIndex = null;
        let touchDragEl = null;
        let touchStartX = 0;
        let touchStartY = 0;
        let touchGhost = null;       // floating ghost element during touch drag
        let touchIsDraggingToTable = false;

        function renderHand(cards, suit, myTurn, freePlay) {
            currentHandCards = cards; // store for drop zone playback
            const hand = document.getElementById('hand');
            const stateHash = cards.map((c, i) => {
                const playable = myTurn && (freePlay || c.suit === suit);
                return c.value + c.suit + (playable ? 'P' : 'X') + i;
            }).join('|') + '|' + myTurn + '|' + freePlay;

            if (hand.dataset.stateHash === stateHash && hand.children.length === cards.length) return;
            hand.dataset.stateHash = stateHash;

            const existingCards = {};
            Array.from(hand.children).forEach(child => {
                if (child.dataset.cardId) {
                    existingCards[child.dataset.cardId] = child;
                    child.dataset.stale = 'true';
                }
            });

            // Responsive card sizing
            const isMobile = window.innerWidth < 600;
            const cardWidth  = isMobile ? 58 : 70;
            const cardHeight = isMobile ? 84 : 102;
            const handW = hand.offsetWidth || window.innerWidth - 20;

            const n = cards.length;
            const ROW_THRESHOLD = 6; // switch to 2 rows above this count
            const useTwoRows = n > ROW_THRESHOLD;

            hand.classList.toggle('two-rows', useTwoRows);

            // ── Layout calculation ──
            let positions; // array of {tx, ty} per card index

            if (!useTwoRows) {
                // Single row: overlap if needed
                const minGap = 3;
                const naturalW = n * cardWidth + (n - 1) * minGap;
                let stepX;
                if (naturalW <= handW) {
                    stepX = cardWidth + minGap;
                } else {
                    stepX = Math.max(18, (handW - cardWidth) / Math.max(n - 1, 1));
                }
                const totalW = (n - 1) * stepX + cardWidth;
                // startOff: left edge of first card, relative to container center
                const startOff = -totalW / 2;
                const ty = -cardHeight / 2;

                positions = cards.map((_, i) => ({
                    // tx = center of card i, relative to container center
                    // translate(-50%) shifts by -cardWidth/2, so we add cardWidth/2 to compensate
                    tx: startOff + i * stepX + cardWidth / 2,
                    ty
                }));
            } else {
                // Two rows: split cards evenly, row0 = top, row1 = bottom
                const row0Count = Math.ceil(n / 2);
                const row1Count = n - row0Count;

                const rowGap = 10;
                const rowTopY    = -(cardHeight + rowGap / 2);
                const rowBottomY = rowGap / 2;

                function rowPositions(count, baseY) {
                    const minGap = 6;
                    const naturalW = count * cardWidth + (count - 1) * minGap;
                    let stepX;
                    if (naturalW <= handW) {
                        stepX = cardWidth + minGap;
                    } else {
                        stepX = Math.max(18, (handW - cardWidth) / Math.max(count - 1, 1));
                    }
                    const totalW = (count - 1) * stepX + cardWidth;
                    const startOff = -totalW / 2;
                    return Array.from({ length: count }, (_, i) => ({
                        tx: startOff + i * stepX + cardWidth / 2,
                        ty: baseY
                    }));
                }

                const top    = rowPositions(row0Count, rowTopY);
                const bottom = rowPositions(row1Count, rowBottomY);
                positions = [...top, ...bottom];
            }

            cards.forEach((c, i) => {
                const { tx, ty } = positions[i];

                const cardId = c.value + '-' + c.suit + '-' + i;
                const playable = myTurn && (freePlay || c.suit === suit);
                const red = isRed(c.suit);

                let div = existingCards[cardId];
                if (!div) {
                    div = document.createElement('div');
                    div.dataset.cardId = cardId;
                    div.innerHTML = `
                        <div class="corner tl">${escHtml(c.value)}<br>${c.suit}</div>
                        <div class="hv">${escHtml(c.value)}</div>
                        <div class="hs">${c.suit}</div>
                        <div class="corner br">${escHtml(c.value)}<br>${c.suit}</div>
                    `;

                    // ── MOUSE drag & drop (reorder between cards) ──
                    div.draggable = true;
                    div.ondragstart = (e) => {
                        e.dataTransfer.setData('cardIndex', div.dataset.currentIndex);
                        e.dataTransfer.setData('action', 'play');

                        div.style.transform += ' scale(1.1)';
                        div.style.zIndex = 2000;

                        div.classList.add('dragging');

                        // 🔥 pastikan visible
                        div.style.opacity = '1';

                        e.dataTransfer.effectAllowed = 'move';

                        document.getElementById('table-spread-area').classList.add('drop-target');
                        document.getElementById('center-table').classList.add('drop-active');
                    };
                    div.ondragend = () => {
                        // reset class
                        div.classList.remove('dragging');

                        div.style.transform = div.style.transform.replace(' scale(1.1)', '');

                        // reset semua highlight
                        document.querySelectorAll('.hand-card').forEach(card => {
                            card.classList.remove('drag-over');
                            card.classList.remove('dragging');

                            // 🔥 RESET VISUAL FULL
                            card.style.opacity = '1';
                            card.style.pointerEvents = '';
                        });

                        // reset table highlight
                        document.getElementById('table-spread-area').classList.remove('drop-target');
                        document.getElementById('center-table').classList.remove('drop-active');
                    };
                    div.ondragover = (e) => {
                        e.preventDefault();
                        div.classList.add('drag-over');
                        e.dataTransfer.dropEffect = 'move';
                    };
                    div.ondragleave = () => div.classList.remove('drag-over');
                    div.ondrop = (e) => {
                        e.preventDefault();
                        div.classList.remove('drag-over');
                        const fromIndex = parseInt(e.dataTransfer.getData('cardIndex'));
                        const toIndex = parseInt(div.dataset.currentIndex);
                        if (!isNaN(fromIndex) && fromIndex !== toIndex) {
                            reorderCardHand(fromIndex, toIndex);
                        }
                    };

                    // ── TOUCH drag (supports both reorder & play to table) ──
                    div.addEventListener('touchstart', (e) => {
                        touchStartX = e.touches[0].clientX;
                        touchStartY = e.touches[0].clientY;
                        touchDragIndex = parseInt(div.dataset.currentIndex);
                        touchDragEl = div;
                        touchIsDraggingToTable = false;

                        // Create ghost card that follows finger
                        touchGhost = div.cloneNode(true);
                        touchGhost.style.position = 'fixed';
                        touchGhost.style.width = div.offsetWidth + 'px';
                        touchGhost.style.height = div.offsetHeight + 'px';
                        touchGhost.style.left = (e.touches[0].clientX - div.offsetWidth / 2) + 'px';
                        touchGhost.style.top  = (e.touches[0].clientY - div.offsetHeight / 2) + 'px';
                        touchGhost.style.zIndex = '3000';
                        touchGhost.style.opacity = '0.85';
                        touchGhost.style.pointerEvents = 'none';
                        touchGhost.style.transform = 'scale(1.08)';
                        touchGhost.style.boxShadow = '0 20px 40px rgba(0,0,0,0.5)';
                        touchGhost.style.transition = 'none';
                        touchGhost.className = div.className.replace('dragging','');
                        document.body.appendChild(touchGhost);
                        div.style.opacity = '0.35';
                    }, { passive: true });

                    div.addEventListener('touchmove', (e) => {
                        if (!touchGhost) return;
                        const tx = e.touches[0].clientX;
                        const ty = e.touches[0].clientY;
                        touchGhost.style.left = (tx - touchGhost.offsetWidth / 2) + 'px';
                        touchGhost.style.top  = (ty - touchGhost.offsetHeight / 2) + 'px';

                        // Check if hovering over table
                        const table = document.getElementById('table-spread-area');
                        const tr = table.getBoundingClientRect();
                        // Expand hit area upward for easier drop
                        const expandedTop = tr.top - 60;
                        const overTable = tx >= tr.left && tx <= tr.right && ty >= expandedTop && ty <= tr.bottom + 30;
                        table.classList.toggle('drop-target', overTable);
                        document.getElementById('center-table').classList.toggle('drop-active', overTable);
                        touchIsDraggingToTable = overTable;
                    }, { passive: true });

                    div.addEventListener('touchend', (e) => {
                        if (touchGhost) {
                            touchGhost.remove();
                            touchGhost = null;
                        }
                        if (touchDragEl) touchDragEl.style.opacity = '';

                        document.getElementById('table-spread-area').classList.remove('drop-target');
                        document.getElementById('center-table').classList.remove('drop-active');

                        const dx = e.changedTouches[0].clientX - touchStartX;
                        const dy = e.changedTouches[0].clientY - touchStartY;
                        const dist = Math.sqrt(dx*dx + dy*dy);

                        if (touchIsDraggingToTable && div.dataset.playable === 'true') {
                            // Dropped onto table → play card
                            const idx = parseInt(div.dataset.currentIndex);
                            playCardWithAnim(idx, div, c);
                        } else if (!touchIsDraggingToTable) {
                            const hand = document.getElementById('hand');
                            const handRect = hand.getBoundingClientRect();

                            const touchX = e.changedTouches[0].clientX;

                            // posisi relatif dalam hand
                            const relativeX = touchX - handRect.left;

                            // hitung index berdasarkan posisi
                            const cardWidth = handRect.width / cards.length;
                            let toIdx = Math.floor(relativeX / cardWidth);

                            toIdx = Math.max(0, Math.min(cards.length - 1, toIdx));

                            const fromIdx = touchDragIndex;

                            if (fromIdx !== toIdx) {
                                reorderCardHand(fromIdx, toIdx);
                            }
                        }

                        touchDragEl = null;
                        touchDragIndex = null;
                        touchIsDraggingToTable = false;
                    }, { passive: true });
                }

                delete div.dataset.stale;
                div.dataset.currentIndex = i;
                div.dataset.playable = playable ? 'true' : 'false';
                div.className = `hand-card ${red ? 'red-card' : 'black-card'} ${playable ? 'playable' : (myTurn ? 'invalid' : '')}`;

                // tx already includes cardWidth/2 offset so that translate(-50%) cancels out
                // net result: card left-edge lands exactly at (containerCenter + startOff + i*stepX)
                div.style.transform = `translate(calc(-50% + ${tx}px), ${ty}px)`;
                // Bottom row (higher ty) gets higher zIndex so it appears in front
                const rowBonus = ty > 0 ? 50 : 0;
                div.style.zIndex = i + 10 + rowBonus;
                div.style.opacity = '1';

                // NO onclick — must drag to table to play
                div.onclick = null;

                if (!div.parentElement) hand.appendChild(div);
            });

            // Cleanup removed cards
            Object.values(existingCards).forEach(child => {
                if (child.dataset.stale === 'true') child.remove();
            });
        }

        function playCardWithAnim(index, el, card) {
            const rect = el.getBoundingClientRect();
            const area = document.getElementById('table-spread-area');
            const targetRect = area.getBoundingClientRect();

            // Create animation clone
            const clone = el.cloneNode(true);
            clone.className = 'table-card throwing-card' + (isRed(card.suit) ? ' red-card' : ' black-card');
            clone.style.left = rect.left + 'px';
            clone.style.top = rect.top + 'px';
            clone.style.width = rect.width + 'px';
            clone.style.height = rect.height + 'px';
            clone.style.margin = '0';

            document.body.appendChild(clone);

            // Trigger move
            setTimeout(() => {
                const centerX = targetRect.left + (targetRect.width / 2) - (rect.width / 2);
                const centerY = targetRect.top + (targetRect.height / 2) - (rect.height / 2);

                clone.style.transition = 'all 0.45s cubic-bezier(0.22, 1, 0.36, 1)';

                const arc = -80; // tinggi lengkungan
                const midX = (rect.left + centerX) / 2;
                const midY = (rect.top + centerY) / 2 + arc;

                // animasi 2 tahap biar ada "lemparan"
                setTimeout(() => {
                    clone.style.left = midX + 'px';
                    clone.style.top = midY + 'px';
                    clone.style.transform = `rotate(${Math.random() * 20 - 10}deg) scale(1.15)`;
                }, 10);

                setTimeout(() => {
                    clone.style.left = centerX + 'px';
                    clone.style.top = centerY + 'px';
                    clone.style.transform = `rotate(${Math.random() * 30 - 15}deg) scale(1.05)`;
                    clone.style.opacity = '0.9';
                }, 200);
            }, 10);

            // Hide original
            el.style.opacity = '0';
            el.style.pointerEvents = 'none';

            // Send to server
            setTimeout(() => {
                clone.remove(); // 🔥 hapus dulu biar nggak tabrakan sama render

                const cardId = card ? card.value + '|' + card.suit : null;
                socket.emit('playCard', { index, cardId });
            }, 400);
        }

        /* ── TABLE DROP ZONE (mouse drag-to-play) ── */
        function setupTableDropZone() {
            const area = document.getElementById('table-spread-area');
            const table = document.getElementById('center-table');

            area.addEventListener('dragover', (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                area.classList.add('drop-target');
                table.classList.add('drop-active');
            });
            area.addEventListener('dragleave', (e) => {
                // Only remove if leaving the area entirely
                if (!area.contains(e.relatedTarget)) {
                    area.classList.remove('drop-target');
                    table.classList.remove('drop-active');
                }
            });
            area.addEventListener('drop', (e) => {
                e.preventDefault();
                area.classList.remove('drop-target');
                table.classList.remove('drop-active');
                const cardIndex = parseInt(e.dataTransfer.getData('cardIndex'));
                if (isNaN(cardIndex)) return;
                // Find the card element and play it
                const hand = document.getElementById('hand');
                const cardEl = Array.from(hand.children).find(el => parseInt(el.dataset.currentIndex) === cardIndex);
                if (cardEl && cardEl.dataset.playable === 'true') {
                    // Get the card data from rendered cards
                    playCardByIndex(cardIndex, cardEl);
                }
            });

            // Also make the center-table itself a drop zone (bigger hit area)
            table.addEventListener('dragover', (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                area.classList.add('drop-target');
                table.classList.add('drop-active');
            });
            table.addEventListener('dragleave', (e) => {
                if (!table.contains(e.relatedTarget)) {
                    area.classList.remove('drop-target');
                    table.classList.remove('drop-active');
                }
            });
            table.addEventListener('drop', (e) => {
                e.preventDefault();
                area.classList.remove('drop-target');
                table.classList.remove('drop-active');
                const cardIndex = parseInt(e.dataTransfer.getData('cardIndex'));
                if (isNaN(cardIndex)) return;
                const hand = document.getElementById('hand');
                const cardEl = Array.from(hand.children).find(el => parseInt(el.dataset.currentIndex) === cardIndex);
                if (cardEl && cardEl.dataset.playable === 'true') {
                    playCardByIndex(cardIndex, cardEl);
                }
            });
        }

        // Store current hand cards for playback
        let currentHandCards = [];
        let isMovePending = false;

        function playCardByIndex(index, el) {
            if (isMovePending) return;

            const card = currentHandCards[index];
            if (!card) return;

            isMovePending = true;
            playCardWithAnim(index, el, card);
        }

        setupTableDropZone();

        /* ── ACTIONS ── */
        function drawCard() { 
            if (isMovePending) return;
            isMovePending = true;
            lastAction = "draw";
            socket.emit('drawCard');
        }
        function startGameManual() {
            console.log('Sending startGame event to server...');
            socket.emit('startGame');
        }
        function reorderCardHand(fromIndex, toIndex) {
            socket.emit('reorderCardHand', { fromIndex, toIndex });
        }
        function restartGame() {
            document.getElementById('overlay').classList.remove('show');
            socket.emit('restartGame');
        }

        /* ── GAME OVER ── */
        socket.on('gameOver', (data) => {
            const isWinner = (data.winner === myIndex);
            const winnerName = data.winnerName;
            const loserName = data.loserName;
            const isLoser = (data.loser === myIndex);

            const title = document.getElementById('overlay-title');
            const icon = document.getElementById('overlay-icon');
            const sub = document.getElementById('overlay-sub');

            if (isWinner) {
                icon.textContent = '🏆';
                title.textContent = 'Kamu Menang!';
                title.style.color = 'var(--gold-light)';
                sub.textContent = 'Hebat! Kamu berhasil menghabiskan semua kartu!';
            } 

            document.getElementById('overlay').classList.add('show');
            toast('Game selesai!');

            if (data.isMatchEnd) {
                setTimeout(() => {
                    socket.emit('getLeaderboard');
                    document.getElementById('overlay').classList.remove('show');
                }, 2500);
            }
        });

        socket.on('playerJoined', d => toast(d.name + ' bergabung ke meja', '♠'));
        socket.on('playerLeft', d => toast((d.name || 'Pemain') + ' meninggalkan meja', '🚪'));
        socket.on('deckExhausted', d => {
            toast(d.takerName + ' ambil ' + d.cardCount + ' kartu dari meja! Giliran ke ' + d.nextPlayerName, '🂠');
        });
        socket.on('waitingForPlayers', d => {
            document.getElementById('lobby-status').style.display = 'block';
            toast('Menunggu pemain... (' + d.count + '/4)', '⏳');
        });
        socket.on('errorMsg', d => {
            isMovePending = false; // Release lock on error
            toast(d.msg, '⚠️');
        });

        /* ── KEYBOARD ── */
        document.getElementById('name-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') document.getElementById('room-input').focus();
        });
        document.getElementById('room-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') joinRoom();
        });

        //
        function handleTakeTableCard() {
            // Hanya kirim jika deck kosong (visual check di client sebelum ke server)
            const deckCount = parseInt(document.getElementById('deck-count').innerText);
            if (deckCount === 0) {
                socket.emit("takeTableCard");
            } else {
                // showToast("Ambil kartu dari deck terlebih dahulu!");
            }
        }

        function handleDeckClick() {
            const btn = document.getElementById('draw-btn');
            const deckVisual = document.querySelector('.deck-visual');

            if (!btn.disabled) {
                // Pop animation then draw
                deckVisual.classList.remove('pop', 'shake');
                void deckVisual.offsetWidth; // reflow to restart animation
                deckVisual.classList.add('pop');
                deckVisual.addEventListener('animationend', () => {
                    deckVisual.classList.remove('pop');
                }, { once: true });
                drawCard();
            } else {
                // Shake to indicate not allowed
                deckVisual.classList.remove('pop', 'shake');
                void deckVisual.offsetWidth;
                deckVisual.classList.add('shake');
                deckVisual.addEventListener('animationend', () => {
                    deckVisual.classList.remove('shake');
                }, { once: true });
            }
        }

        // ── Fix mobile touch for draw button and deck ──
        (function setupDrawControls() {
            const drawBtn = document.getElementById('draw-btn');
            const deckRow = document.querySelector('.table-info-row.right');

            function onDraw(e) {
                e.preventDefault();
                if (!drawBtn.disabled) drawCard();
            }

            drawBtn.addEventListener('click', onDraw);
            drawBtn.addEventListener('touchend', onDraw, { passive: false });

            // Deck row click/touch → same as draw button
            deckRow.addEventListener('click', (e) => {
                e.stopPropagation();
                handleDeckClick();
            });
            deckRow.addEventListener('touchend', (e) => {
                e.preventDefault();
                e.stopPropagation();
                handleDeckClick();
            }, { passive: false });
        })();

        const fab = document.getElementById('emoji-fab');

        let holdTimer = null;
        let isOpen = false;

        fab.addEventListener('click', (e) => {
            e.stopPropagation(); // biar nggak langsung ketutup

            isOpen = !isOpen;

            if (isOpen) {
                fab.classList.add('active');
            } else {
                fab.classList.remove('active');
            }
        });

        document.addEventListener('click', (e) => {
            const isClickInsideFab = fab.contains(e.target);
            const isClickInput = chatInput.contains(e.target);

            if (!isClickInsideFab && !isClickInput) {
                fab.classList.remove('active');
                chatInput.blur();
            }
        });

        document.addEventListener('click', (e) => {
            const isClickInside =
                chatBox.contains(e.target) ||
                textFab.contains(e.target);

            if (!isClickInside) {
                chatBox.classList.remove('active');
                textFab.style.display = 'flex';
                chatInput.blur();
            }
        });

        function resetTouchDrag() {
            if (touchGhost) {
                touchGhost.remove();
                touchGhost = null;
            }

            if (touchDragEl) {
                touchDragEl.style.opacity = '';
            }

            touchDragEl = null;
            touchDragIndex = null;
            touchIsDraggingToTable = false;

            document.getElementById('table-spread-area').classList.remove('drop-target');
            document.getElementById('center-table').classList.remove('drop-active');
        }

        // 🔥 GLOBAL CANCEL (WAJIB)
        document.addEventListener('touchcancel', resetTouchDrag);
        document.addEventListener('touchend', resetTouchDrag);
    </script>
