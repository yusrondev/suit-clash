<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Suit Clash</title>
    <script src="/socket.io/socket.io.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet" />

    <style>
        /* ── TOKENS ── */
        :root {
            --felt: #1a4731;
            --felt-light: #2d7a54;
            --felt-dark: #0b2116;
            --gold: #d4af37;
            --gold-light: #f1d592;
            --gold-dark: #aa8a2e;
            --card-bg: #ffffff;
            --red: #d32f2f;
            --black: #121212;
            --cream: #f8f4e9;
            --glass: rgba(0, 0, 0, 0.4);
            --glass-border: rgba(212, 175, 55, 0.3);
            --radius: 16px;
            --shadow-card: 0 6px 16px rgba(0, 0, 0, 0.5);
            --shadow-deep: 0 30px 80px rgba(0, 0, 0, 0.8);
            --header-h: 60px;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background: #0d1117;
            background-attachment: fixed;
            font-family: 'Inter', sans-serif;
            color: var(--cream);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 100dvh;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(ellipse at 50% 0%, rgba(30,70,40,0.18) 0%, transparent 65%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── HEADER ── */
        header {
            width: 100%;
            height: var(--header-h);
            padding: 0 16px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            flex-shrink: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            z-index: 1000;
            position: relative;
        }

        .logo {
            /* font-family: 'Playfair Display', serif; */
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 3px;
            color: var(--gold);
        }
        .logo span { color: var(--cream); opacity: 0.7; font-weight: 400; }

        #leaderboard-btn {
            display: none;
            background: linear-gradient(145deg, #2c3e50, #1a252f);
            border: 1px solid var(--gold-dark);
            color: var(--gold-light);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: all 0.2s;
            align-items: center;
            justify-content: center;
        }
        #leaderboard-btn:hover {
            transform: scale(1.1);
            background: var(--gold-dark);
            color: white;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        #hud-top {
            justify-self: end;
            display: none;
            align-items: center;
            gap: 8px;
        }

        .btn-leave {
            background: transparent;
            border: 1px solid rgba(255, 100, 100, 0.35);
            color: rgba(255, 100, 100, 0.8);
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn-leave:hover { background: rgba(255,100,100,0.12); border-color: rgba(255,100,100,0.6); color: white; }

        /* ── LOBBY ── */
        #lobby {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            gap: 24px;
            padding: 20px 20px 40px;
            z-index: 1;
            overflow-y: auto;
        }

        .lobby-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(36px, 10vw, 58px);
            font-weight: 900;
            color: var(--gold);
            letter-spacing: 4px;
            text-align: center;
            animation: glow-text 3s ease-in-out infinite alternate;
        }
        .lobby-sub { color: rgba(245,240,224,0.6); font-size: 14px; text-align: center; }

        @keyframes glow-text {
            from { text-shadow: 0 0 20px rgba(201,168,76,0.3); }
            to   { text-shadow: 0 0 60px rgba(201,168,76,0.75); }
        }

        .room-box {
            background: rgba(0,0,0,0.65);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 28px 24px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            width: 100%;
            max-width: 360px;
            box-shadow: var(--shadow-deep), 0 0 40px rgba(201,168,76,0.1);
            backdrop-filter: blur(16px);
        }
        .room-box label { display: block; font-size: 10px; font-weight: 600; letter-spacing: 1.8px; text-transform: uppercase; color: var(--gold); margin-bottom: 6px; }
        .room-box input {
            width: 100%;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(201,168,76,0.3);
            border-radius: 10px;
            padding: 12px 14px;
            color: var(--cream);
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            outline: none;
            transition: border 0.2s, box-shadow 0.2s;
        }
        .room-box input:focus { border-color: var(--gold); box-shadow: 0 0 12px rgba(201,168,76,0.2); }
        .room-box input::placeholder { color: rgba(245,240,224,0.3); }

        .btn-gold {
            background: linear-gradient(135deg, var(--gold-dark) 0%, var(--gold) 50%, #f3d99d 100%);
            border: none;
            border-radius: 12px;
            padding: 14px 32px;
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #1a1100;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(201,168,76,0.4);
            transition: all 0.2s;
            width: 100%;
            text-transform: uppercase;
        }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(201,168,76,0.6); }
        .btn-gold:active { transform: translateY(0) scale(0.98); }

        .waiting-msg { color: rgba(245,240,224,0.55); font-size: 13px; font-style: italic; text-align: center; }
        .waiting-spin { display: flex; gap: 6px; justify-content: center; margin-top: 8px; }
        .waiting-spin span { width: 7px; height: 7px; border-radius: 50%; background: var(--gold); animation: bounce-dot 1.2s ease-in-out infinite; }
        .waiting-spin span:nth-child(2) { animation-delay: 0.2s; }
        .waiting-spin span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce-dot {
            0%,100% { transform: translateY(0); opacity: 0.4; }
            50%      { transform: translateY(-6px); opacity: 1; }
        }

        /* ── GAME LAYOUT — fills remaining height, no scroll ── */
        #game {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            flex: 1;
            min-height: 0;
            padding: 0;
            gap: 0;
            z-index: 1;
            overflow: hidden;
            position: relative;
        }

        /* ── OPPONENT SEATS (absolute positioned around table) ── */
        .opponent-seat {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            z-index: 10;
            transition: all 0.3s;
        }

        /* Top opponent */
        .opponent-seat[data-pos="top"] {
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
        }
        /* Left opponent */
        .opponent-seat[data-pos="left"] {
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
        }
        /* Right opponent */
        .opponent-seat[data-pos="right"] {
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
        }

        .opponent-seat.active-turn .opp-avatar {
            box-shadow: 0 0 0 3px var(--gold), 0 0 20px var(--gold-light);
            transform: scale(1.1);
        }

        .opponent-seat.active-turn .opponent-name {
            color: var(--gold-light);
            text-shadow: 0 0 8px var(--gold-dark);
            font-size: 11px;
            transform: scale(1.05);
        }

        .opp-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2c5f3a, #1a3d25);
            border: 2px solid rgba(201,168,76,0.4);
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            color: var(--gold-light);
            font-family: 'Playfair Display', serif;
            position: relative;
            transition: box-shadow 0.3s;
            flex-shrink: 0;
        }

        .opponent-name {
            font-size: 10px;
            color: rgba(245,240,224,0.7);
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 90px;
            text-align: center;
            font-weight: 600;
            position: relative;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .opp-card-count {
            font-size: 9px;
            color: rgba(201,168,76,0.7);
            font-weight: 600;
            margin-top: 8%;
        }

        .opp-cards {
            display: flex;
            position: relative;
            height: 32px;
            width: 70px;
            justify-content: center;
        }

        .opp-card-back {
            position: absolute;
            width: 22px;
            height: 32px;
            border-radius: 3px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 1px 1px 4px rgba(0,0,0,0.5);
            background-color: #3463c3;
            background-image:
                repeating-linear-gradient(45deg, rgba(255,255,255,0.05) 0px, rgba(255,255,255,0.05) 2px, transparent 2px, transparent 6px),
                repeating-linear-gradient(-45deg, rgba(255,255,255,0.05) 0px, rgba(255,255,255,0.05) 2px, transparent 2px, transparent 6px);
            transition: transform 0.2s;
        }

        .badge-ctrl {
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.8px;
            color: var(--gold);
            background: rgba(201,168,76,0.12);
            border: 1px solid rgba(201,168,76,0.3);
            border-radius: 999px;
            padding: 1px 6px;
        }

        /* ── BOARD: full area with rounded-rect table ── */
        #board {
            position: relative;
            width: 100%;
            flex: 1;
            min-height: 0;
            display: flex;
            align-items: stretch;
            justify-content: center;
            padding: 6px 8px 0;
        }

        /* ── CENTER TABLE — rounded rectangle, fills the board ── */
        #center-table {
            border: 2px solid rgba(201,168,76,0.45);
            border-radius: 36px;
            width: 100%;
            max-width: 520px;
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow:
                inset 0 8px 40px rgba(0,0,0,0.35),
                inset 0 -4px 20px rgba(0,0,0,0.2),
                0 4px 30px rgba(0,0,0,0.7),
                0 0 0 5px rgba(0,0,0,0.4);
            padding: 16px 16px;
            position: relative;
            overflow: visible;
            background:
                radial-gradient(ellipse at 50% 40%, #23613d 0%, #154228 50%, #0d2818 100%);
            border: 2px solid var(--gold-dark);
            overflow: visible;
        }

        /* #center-table::before {
            content: '♠  ♥  ♦  ♣';
            position: absolute;
            top: 12px;
            font-size: 9px;
            letter-spacing: 6px;
            color: rgba(201,168,76,0.08);
            pointer-events: none;
        } */

        /* Table spread area */
        #table-spread-area {
            position: relative;
            width: 100%;
            max-width: 260px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Individual card on table */
        .table-card {
            width: 56px;
            height: 80px;
            border-radius: 8px;
            background: var(--card-bg);
            border: 1.5px solid rgba(0,0,0,0.12);
            box-shadow: var(--shadow-card), inset 0 1px 0 rgba(255,255,255,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Playfair Display', serif;
            position: absolute;
            top: 50%;
            left: 50%;
            transform-origin: center center;
            transition: opacity 0.3s ease;
            will-change: opacity;
        }
        .table-card .tc-val { font-size: 22px; font-weight: 900; line-height: 1; }
        .table-card .tc-corner {
            position: absolute;
            font-size: 9px;
            line-height: 1.15;
            text-align: center;
        }
        .table-card .tc-corner.tl { top: 4px; left: 5px; }
        .table-card .tc-corner.br { bottom: 4px; right: 5px; transform: rotate(180deg); }

        .table-card.champion {
            box-shadow: var(--shadow-card), 0 0 14px rgba(201,168,76,0.5), inset 0 1px 0 rgba(255,255,255,0.8);
            border-color: var(--gold);
        }
        .table-card.history { opacity: 1; }

        @keyframes cardSweep { 0% { opacity:1; } 100% { opacity:0; } }
        .table-card.sweeping { animation: cardSweep 0.5s ease forwards; }
        @keyframes cardLand  { 0% { opacity:0; } 100% { opacity:1; } }

        .throwing-card {
            position: fixed;
            z-index: 2000;
            pointer-events: none;
            transition: all 0.35s cubic-bezier(0.2,0.8,0.2,1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        /* 🔥 EFFECT: ACE ON FIRE */
        .card-ace-fire {
            z-index: 5000 !important;
            animation: ace-glow-pulse 0.5s ease-in-out infinite alternate;
        }

        .card-ace-fire::after {
            content: '';
            position: absolute;
            inset: -10px;
            background: radial-gradient(circle at 50% 100%, 
                rgba(255, 80, 0, 0.8) 0%, 
                rgba(255, 150, 0, 0.4) 40%, 
                transparent 70%);
            filter: blur(8px);
            z-index: -1;
            border-radius: 12px;
            animation: ace-flame-flicker 0.1s infinite alternate;
            pointer-events: none;
        }

        @keyframes ace-glow-pulse {
            from { box-shadow: 0 0 15px #ff4500, 0 0 30px #ff8c00; }
            to   { box-shadow: 0 0 30px #ff4500, 0 0 60px #ff0000; }
        }

        @keyframes ace-flame-flicker {
            from { opacity: 0.7; transform: scale(1); }
            to   { opacity: 1; transform: scale(1.05) translate(1px, -2px); }
        }

        /* Deck */
        .table-info-row.right {
            position: absolute;
            right: 50%;
            top: 73%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            transition: opacity 0.4s ease;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            z-index: 999999;
            left: 50%;
        }
        .table-info-row.right:active { transform: translateY(-50%) scale(0.93); }
        .table-info-row.right.deck-hidden {
            opacity: 0;
            pointer-events: none;
        }
        .deck-visual {
            position: relative;
            width: 28px;
            height: 40px;
            transition: transform 0.2s ease;
            flex-shrink: 0;
        }
        .table-info-row.right:hover .deck-visual { transform: translateY(-3px) scale(1.07); }
        .deck-visual .dc {
            position: absolute;
            width: 28px;
            height: 40px;
            border-radius: 4px;
            background: linear-gradient(135deg, #1e3a8a, #3b6fd4);
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }
        .deck-visual .dc:nth-child(1) { top: 2px; left: 2px; }
        .deck-visual .dc:nth-child(2) { top: 1px; left: 1px; }
        .deck-visual .dc:nth-child(3) { top: 0; left: 0; }
        .deck-info { display: flex; flex-direction: column; gap: 1px; align-items: center; }
        .deck-count-label { font-family: 'Playfair Display', serif; font-size: 14px; color: var(--gold-light); line-height: 1; }
        .deck-count-sub { font-size: 7px; font-weight: 600; letter-spacing: 0.8px; color: rgba(245,240,224,0.4); text-transform: uppercase; margin-top: 2px; }

        /* Deck draw animation */
        @keyframes deckPop {
            0%   { transform: translateY(0) scale(1) rotate(0deg); }
            30%  { transform: translateY(-18px) scale(1.15) rotate(-8deg); }
            60%  { transform: translateY(-10px) scale(1.08) rotate(5deg); }
            100% { transform: translateY(0) scale(1) rotate(0deg); }
        }
        .deck-visual.pop .dc:nth-child(3) {
            animation: deckPop 0.45s cubic-bezier(0.34,1.56,0.64,1) forwards;
        }
        /* Shake/deny animation when draw not allowed */
        @keyframes deckShake {
            0%,100% { transform: translateX(0); }
            20%     { transform: translateX(-5px) rotate(-3deg); }
            40%     { transform: translateX(5px) rotate(3deg); }
            60%     { transform: translateX(-4px) rotate(-2deg); }
            80%     { transform: translateX(4px) rotate(2deg); }
        }
        .deck-visual.shake {
            animation: deckShake 0.4s ease forwards;
        }

        .suit-badge {
            display: none;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: rgba(245,240,224,0.6);
        }

        /* Opponents container fills the board area */
        #opponents-row {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }
        #opponents-row .opponent-seat {
            pointer-events: auto;
        }

        #round-winner-label {
            display: none;
            position: absolute;
            bottom: -60px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.8px;
            color: var(--gold-light);
            opacity: 0;
            transition: opacity 0.3s;
            text-transform: uppercase;
            white-space: nowrap;
        }
        #round-winner-label.visible { opacity: 1; }

        /* ── STATUS BAR ── */
        #status-bar {
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(201,168,76,0.18);
            border-radius: 999px;
            padding: 5px 16px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.2px;
            color: var(--cream);
            text-align: center;
            /* width: calc(100% - 20px); */
            max-width: 380px;
            flex-shrink: 0;
            transition: all 0.3s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
            backdrop-filter: blur(8px);
        }
        #status-bar.your-turn {
            margin-bottom: 20px;
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.15);
            color: var(--gold-light);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            transform: scale(1.05);
        }

        .your-identity {
            font-size: 12px;
            font-weight: 700;
            color: rgba(245,240,224,0.6);
            margin-bottom: 6px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .your-identity.active {
            color: var(--gold-light);
            text-shadow: 0 0 10px var(--gold);
            transform: scale(1.1);
        }

        /* ── YOUR AREA — floats up close to the table ── */
        #your-area {
            position: relative;
            width: 100%;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            margin-top: -50px;
            z-index: 20;
            padding-bottom: 25px;
        }

        /* hide player-row remnants */
        #your-player-row { display: none; }
        #your-name-label { display: none; }
        #your-avatar     { display: none; }

        .your-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 2px;
            color: rgba(201,168,76,0.5);
            text-transform: uppercase;
            flex-shrink: 0;
        }

        #hand {
            position: relative;
            width: 100%;
            height: 96px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: visible;
        }
        #hand.two-rows {
            height: 172px;
        }

        .hand-card {
            width: 62px;
            height: 90px;
            border-radius: 8px;
            background: var(--card-bg);
            border: 1.5px solid rgba(0,0,0,0.1);
            box-shadow: var(--shadow-card);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: grab;
            position: absolute;
            top: 50%;
            left: 50%;
            transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1),
                        box-shadow 0.2s, opacity 0.2s;
            animation: dealCard 0.35s cubic-bezier(0.34,1.56,0.64,1) backwards;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            will-change: transform;
        }
        @keyframes dealCard {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .hand-card:active { cursor: grabbing; }

        .hand-card.playable { border-color: var(--gold); cursor: grab; }
        .hand-card.playable::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 11px;
            border: 2px solid rgba(201,168,76,0.5);
            animation: pulse-playable 1.6s ease-in-out infinite;
        }
        @keyframes pulse-playable {
            0%,100% { opacity: 0.3; }
            50%      { opacity: 1; }
        }
        .hand-card.invalid { filter: brightness(0.45) saturate(0.2); cursor: not-allowed; }

        .hand-card .hv { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 900; line-height: 1; }
        .hand-card .hs { font-size: 16px; line-height: 1; margin-top: 2px;}
        .hand-card .corner { position: absolute; font-size: 9px; line-height: 1.2; text-align: center; font-weight: 600; }
        .hand-card .corner.tl { top: 4px; left: 5px; }
        .hand-card .corner.br { bottom: 4px; right: 5px; transform: rotate(180deg); }

        .red-card   { color: var(--red); }
        .black-card { color: var(--black); }

        /* drag & drop */
        .hand-card.dragging  { opacity: 0.35; cursor: grabbing; filter: grayscale(0.5); }
        .hand-card.drag-over { border: 2px solid var(--gold); box-shadow: 0 0 20px rgba(201,168,76,0.5); }

        /* Table drop zone highlight */
        #table-spread-area.drop-target {
            outline: 3px dashed rgba(201,168,76,0.7);
            outline-offset: 6px;
            border-radius: 12px;
            background: rgba(201,168,76,0.07);
            transition: background 0.2s;
        }
        #center-table.drop-active {
            border-color: var(--gold-light);
            box-shadow: inset 0 4px 20px rgba(201,168,76,0.15), 0 8px 30px rgba(0,0,0,0.5), 0 0 30px rgba(201,168,76,0.2);

        /* ── ACTION BUTTONS ── */
        #actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            flex-shrink: 0;
            padding: 4px 0 6px;
        }

        .btn-draw {
            display: none !important;
            background: transparent;
            border: 1.5px solid var(--gold-dark);
            border-radius: 999px;
            padding: 10px 28px;
            font-size: 13px;
            letter-spacing: 1.2px;
            color: var(--gold);
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-draw:hover:not(:disabled) { background: rgba(201,168,76,0.1); border-color: var(--gold); box-shadow: 0 0 16px rgba(201,168,76,0.25); }
        .btn-draw:active:not(:disabled) { transform: scale(0.97); }
        .btn-draw:disabled { opacity: 0.25; cursor: not-allowed; }

        /* ── GAME OVER OVERLAY ── */
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.82); backdrop-filter: blur(8px); z-index: 100; flex-direction: column; align-items: center; justify-content: center; gap: 20px; padding: 20px; }
        #overlay.show { display: flex; }
        .overlay-card {
            background: rgba(12,38,25,0.97);
            border: 2px solid var(--gold-dark);
            border-radius: 20px;
            padding: 36px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.7);
            text-align: center;
            width: 100%;
            max-width: 340px;
        }
        .overlay-icon  { font-size: 56px; animation: glow-text 2s infinite alternate; }
        .overlay-title { font-family: 'Playfair Display', serif; font-size: 30px; font-weight: 900; color: var(--gold); }
        .overlay-sub   { color: rgba(245,240,224,0.65); font-size: 15px; }

        /* ── TOAST ── */
        #toast-container { position: fixed; top: calc(var(--header-h) + 8px); right: 12px; z-index: 200; display: flex; flex-direction: column; gap: 6px; max-width: calc(100vw - 24px); }
        .toast {
            background: rgba(0,0,0,0.88);
            border: 1px solid rgba(201,168,76,0.3);
            border-left: 3px solid var(--gold);
            border-radius: 8px;
            padding: 9px 13px;
            color: var(--cream);
            font-size: 12px;
            font-weight: 500;
            animation: toastIn 0.3s ease, toastOut 0.3s ease 2.8s forwards;
            backdrop-filter: blur(8px);
            pointer-events: none;
        }
        @keyframes toastIn  { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes toastOut { to   { transform: translateX(100px); opacity: 0; } }

        /* ── DESKTOP ENHANCEMENTS ── */
        @media (min-width: 600px) {
            :root { --header-h: 60px; }
            header { padding: 0 32px; }
            .logo  { font-size: 22px; }

            #board { padding: 8px 24px 0; }
            #center-table { border-radius: 48px; }
            #table-spread-area { max-width: 340px; height: 120px; }
            .table-card { width: 66px; height: 96px; }
            .table-card .tc-val { font-size: 28px; }
            .table-card .tc-corner { font-size: 10px; }
            .deck-visual { width: 36px; height: 52px; }
            .deck-visual .dc { width: 36px; height: 52px; }
            .deck-count-label { font-size: 18px; }

            .opp-avatar { width: 52px; height: 52px; font-size: 22px; }

            #status-bar { font-size: 13px; padding: 7px 22px; }

            .hand-card { width: 70px; height: 102px; }
            .hand-card .hv { font-size: 28px; }
            .hand-card .hs { font-size: 20px; }
            .hand-card .corner { font-size: 10px; }
            .hand-card.playable:hover { filter: brightness(1.05); box-shadow: 0 8px 24px rgba(201,168,76,0.5); }
            #hand { height: 110px; }
            #hand.two-rows { height: 220px; }

            .btn-draw { font-size: 14px; padding: 11px 32px; }
        }

        /* ── SHORT SCREENS ── */
        @media (max-height: 700px) {
            #your-area { margin-top: -40px; }
            #table-spread-area { height: 82px; }
            .table-card { width: 50px; height: 72px; }
            .table-card .tc-val { font-size: 20px; }
            .opp-avatar { width: 36px; height: 36px; font-size: 14px; }
            .deck-visual { width: 26px; height: 36px; }
            .deck-visual .dc { width: 26px; height: 36px; }

    <header>
        <div class="logo">Suit <span>Clash</span></div>

        <div id="board">

            <!-- Opponents rendered here by JS -->
            <div id="opponents-row"></div>

            <div id="center-table">

                <div class="table-info-row right">

                <div id="table-spread-area" onclick="handleTakeTableCard()"></div>

            <div id="actions">
                <button class="btn-draw" id="draw-btn" disabled>
                    Ambil Kartu
                </button>

            <div id="chat-history"></div>
            <input type="text" id="chat-input" placeholder="Ketik sesuatu..." />
        </div>
        <div id="emoji-fab">
            😄
            <div id="emoji-menu">
                <button onclick="pickEmoji('😂')">😂</button>
                <button onclick="pickEmoji('😏')">😏</button>
                <button onclick="pickEmoji('🔥')">🔥</button>
                <button onclick="pickEmoji('🐢')">🐢</button>
                <button onclick="pickEmoji('👑')">👑</button>
            </div>
        </div>

    <!-- GAME OVER OVERLAY -->
    <div id="overlay">
        <div class="overlay-card">
            <div class="overlay-icon" id="overlay-icon">💀</div>
            <div class="overlay-title" id="overlay-title">Game Over</div>
            <div class="overlay-sub" id="overlay-sub"></div>
            <button class="btn-gold" style="width:auto;padding:12px 36px;" onclick="restartGame()">Main Lagi</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        let myIndex = -1;
        let myName = '';
        let currentSuit = null;
        let isMyTurn = false;
        let playerNames = [];
        let prevTableCount = 0;

        let lastClutch = "";
        let lastAction = "";
        let clutchTimeout = null;

        // 🔥 CHAT HISTORY STATE
        let chatHistory = [];
        const MAX_HISTORY = 3;

        let lastDangerPlayers = new Set();
        let lastDangerTime = 0;
        const DANGER_COOLDOWN = 6000; // 6 detik

        let lastEmojiTime = 0;
        const EMOJI_COOLDOWN = 3000; // 3 detik


        const turnSound = new Audio('/turn.mp3');
        turnSound.volume = 0.6;

        const popSound = new Audio('/pop.mp3');
        popSound.volume = 0.7;

        const tauntSound = new Audio('/taunt.mp3');
        tauntSound.volume = 0.7;

        const clutchWinSound = new Audio('/win.mp3');
        const clutchDangerSound = new Audio('/warning.mp3');

        // 🔥 UNLOCK AUDIO (TARUH DI SINI)
        let audioUnlocked = false;

        document.addEventListener('click', () => {
            if (audioUnlocked) return;

            Promise.all([
                turnSound.play().then(() => {
                    turnSound.pause();
                    turnSound.currentTime = 0;
                }),
                popSound.play().then(() => {
                    popSound.pause();
                    popSound.currentTime = 0;
                })
            ]).then(() => {
                audioUnlocked = true;
            }).catch(() => {});
        }, { once: true });

        document.getElementById('leaderboard-btn').onclick = () => {
            socket.emit('getLeaderboard');
        };

        const textFab = document.getElementById('text-fab');
        const chatBox = document.getElementById('chat-input-box');
        const chatInput = document.getElementById('chat-input');

        function playClutchSound(type) {
            const s = type === 'win' ? clutchWinSound : clutchDangerSound;
            s.currentTime = 0;
            s.play().catch(()=>{});
        }

        textFab.addEventListener('click', () => {
            chatBox.classList.add('active');
            textFab.style.display = 'none';

            setTimeout(() => {
                chatInput.focus(); // buka keyboard mobile
            }, 100);
        });

        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();

                const msg = chatInput.value.trim();
                if (!msg) return;

                sendChat(msg);

                chatInput.value = '';

                // 🔥 ini kunci utamanya
                chatInput.blur();

                // hide UI
                chatBox.classList.remove('active');
                textFab.style.display = 'flex';
            }
        });

        function sendChat(msg) {
            socket.emit('chat', msg);
            showSelfChat(msg); // tampilkan di tengah (POV sendiri)
            updateChatHistory("Kamu", msg); // 🔥 Update history lokal
        }

        function updateChatHistory(name, msg) {
            chatHistory.push({ name, msg });
            if (chatHistory.length > MAX_HISTORY) {
                chatHistory.shift();
            }
            renderChatHistory();
        }

        function renderChatHistory() {
            const container = document.getElementById('chat-history');
            container.innerHTML = chatHistory.map(item => `
                <div class="chat-history-item">
                    <span>${escHtml(item.name)}:</span>${escHtml(item.msg)}
                </div>
            `).join('');
        }

        function showSelfChat(msg) {
            const el = document.createElement('div');
            el.className = 'chat-self';
            el.textContent = msg;

            document.body.appendChild(el);

            setTimeout(() => el.remove(), 150000);
        }

        // 👇 baru lanjut code lain
        let prevTurn = null;

        // Track which cards are currently rendered on the table (for spread effect)
        let renderedRoundCardCount = 0;

        /* ── JOIN ROOM ── */
        function joinRoom() {
            const ni = document.getElementById('name-input');
            const ri = document.getElementById('room-input');
            myName = ni.value.trim() || localStorage.getItem('remi_name') || 'Pemain';
            const room = ri.value.trim() || localStorage.getItem('remi_room') || 'default';

            socket.emit('joinRoom', { name: myName, room });

            localStorage.setItem('remi_name', myName);
            localStorage.setItem('remi_room', room);

            document.getElementById('lobby-status').style.display = 'block';
            ni.disabled = true;
            ri.disabled = true;
        }

        function sendEmoji(e) {
            socket.emit("sendEmoji", e);
        }

        function pickEmoji(e) {
            const now = Date.now();

            if (now - lastEmojiTime < EMOJI_COOLDOWN) {
                // optional feedback
                toast("Tunggu dulu...", "⏳");
                return;
            }

            lastEmojiTime = now;

            const tauntMap = {
                "😂": "Serius itu kartu?",
                "😏": "Lama banget sih...",
                "🔥": "Udah kepanasan ya?",
                "🐢": "Loading dulu bro...",
                "👑": "Belajar dulu dek"
            };

            const payload = {
                emoji: e,
                text: tauntMap[e] || ""
            };

            socket.emit("sendEmoji", payload);

            const fab = document.getElementById('emoji-fab');
            fab.classList.remove('active');

            showSelfEmoji(payload);
        }

        function showSelfEmoji(data) {
            const el = document.createElement('div');
            el.className = 'emoji-self';

            el.innerHTML = `
                <div>${data.emoji}</div>
                ${data.text ? `<div class="taunt-text">${data.text}</div>` : ''}
            `;

            document.body.appendChild(el);

            setTimeout(() => el.remove(), 3000);
        }

        function leaveRoom() {
            localStorage.removeItem('remi_name');
            localStorage.removeItem('remi_room');
            window.location.reload();
        }

        window.onload = () => {
            const sn = localStorage.getItem('remi_name');
            if (sn) joinRoom();
        };

        function toast(msg, icon = '♠') {
            const el = document.createElement('div');
            el.className = 'toast';
            el.textContent = icon + '  ' + msg;
            document.getElementById('toast-container').appendChild(el);
            setTimeout(() => el.remove(), 3300);
        }

        /* ── HELPERS ── */
        function isRed(suit) { return suit === '♥' || suit === '♦'; }
        function getInitials(name) {
            return (name || '?').charAt(0).toUpperCase();
        }
        function escHtml(str) {
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }
        function suitName(s) {
            return { '♠': '♠ Sekop', '♥': '♥ Hati', '♦': '♦ Wajik', '♣': '♣ Keriting' }[s] || s;
        }

        function showChatOnPlayer(name, msg) {
            const els = document.querySelectorAll('.opponent-name');

            els.forEach(el => {
                if (el.textContent === name) {
                    const parent = el.parentElement;

                    const bubble = document.createElement('div');
                    bubble.className = 'chat-bubble';
                    bubble.textContent = msg;

                    parent.appendChild(bubble);

                    setTimeout(() => bubble.remove(), 150000);
                }
            });
        }

        socket.on("chat", (data) => {
            // 🔥 Jika itu kita sendiri, abaikan (karena sudah ditangani di sendChat sebagai "Kamu")
            if (data.name === myName) return; 

            showChatOnPlayer(data.name, data.msg);
            updateChatHistory(data.name, data.msg); // 🔥 Update history global
        });

        socket.on('leaderboardData', (list) => {
            const panel = document.getElementById('leaderboard-panel');

            if (list.length === 0) {

                const isTop3 = rank <= 3;
                const medals = ['🥇', '🥈', '🥉'];
                const rankDisplay = medals[index] || `#${rank}`;

                const div = document.createElement('div');
                div.className = 'lb-row' + (isTop3 ? ' top-3' : '');

                div.innerHTML = `
                    <div class="lb-info">

                        ${p.point}<span class="lb-pts-label">pts</span>
                    </div>
                `;

                container.appendChild(div);
            });

            panel.classList.add('show');
        });

        /* ── STATE UPDATE ── */
        socket.on('state', (s) => {
            const wasDraw = (lastAction === "draw");
            lastAction = ""; // reset

            if (s.started) {
                document.getElementById('overlay').classList.remove('show');
            }
            myIndex = s.yourIndex; // Sync early!

            const playersIsOut = s.playersIsOut || [];
            const amIOut = playersIsOut[myIndex];

            isMyTurn = (s.currentPlayer === myIndex) && !amIOut;

            if (prevTurn !== null && prevTurn !== s.currentPlayer) {
                if (s.currentPlayer === myIndex && !amIOut) {
                    popSound.currentTime = 0;
                    popSound.play().catch(() => {});
                }
            }

            prevTurn = s.currentPlayer;

            const currentTableCount = (s.tableHistory || []).length;

            if (currentTableCount > prevTableCount) {
                turnSound.currentTime = 0;
                turnSound.play().catch(() => {});
            }

            prevTableCount = currentTableCount;

            // Always show the header (Logo + Leaderboard + Leave button) once joined

            document.getElementById('leaderboard-btn').style.display = 'flex';

            // Also show actions when game started
            if (s.started) document.getElementById('actions').style.display = 'flex';

            if (!s.started) {

                // 🔥 TAMBAHKAN DI SINI
                const restartBtn = document.querySelector('#overlay button');
                if (restartBtn) {
                    if (myIndex === 0) {
                        restartBtn.style.display = "inline-block"; // host
                    } else {
                        restartBtn.style.display = "none"; // non-host
                    }
                }

                document.getElementById('lobby').style.display = 'flex';
                document.getElementById('game').style.display = 'none';
                document.getElementById('lobby').style.display = 'flex';
                document.getElementById('game').style.display = 'none';

                // Hide inputs but NOT the lobby-status
                document.querySelectorAll('.room-box > div:not(.waiting-msg)').forEach(d => d.style.display = 'none');
                document.querySelector('.room-box > button').style.display = 'none';

                const isHost = (myIndex === 0);
                const startBtn = document.getElementById('start-btn');
                const waitingText = document.getElementById('waiting-text');

                // Render Lobby User List
                const lobbyList = document.getElementById('lobby-user-list') || document.createElement('div');
                if (!lobbyList.id) {

                    document.getElementById('lobby-status').appendChild(lobbyList);

                lobbyList.innerHTML = s.playerNames.map(name => `<div class="user-chip">${escHtml(name)}</div>`).join('');

                if (isHost && s.totalPlayers >= 2) {
                    startBtn.style.display = 'block';
                    waitingText.textContent = `Sudah ada ${s.totalPlayers} pemain. Mulai sekarang?`;
